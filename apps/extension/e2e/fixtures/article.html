<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huayi overlay fixture</title>
    <style>
      body {
        margin: 0;
        background: #ffffff;
        color: #202124;
        font:
          18px/1.55 Arial,
          sans-serif;
      }

      article {
        width: 680px;
        max-width: calc(100vw - 48px);
        margin: 24px auto;
      }

      mark {
        background: #b8d9ff;
      }
    </style>
  </head>
  <body>
    <article>
      <p>
        He said the <mark>investigation</mark> was in its early stages and urged anyone with
        information to come forward.
      </p>
    </article>
    <script type="module">
      import { OverlayController } from "../../src/content/overlay/overlay-controller.ts";

      const controller = new OverlayController({
        onAnalyze: () => undefined,
        onCancel: () => undefined,
      });
      controller.show(
        {
          context:
            "He said the investigation was in its early stages and urged anyone with information to come forward.",
          selection: "investigation",
          selectionKind: "word",
        },
        {
          bottom: 82,
          height: 25,
          left: 230,
          right: 344,
          top: 57,
          width: 114,
        },
      );
      controller.start("translate");
      controller.resolve({
        collocations: [
          { meaningZh: "刑事调查", text: "criminal investigation" },
          { meaningZh: "展开调查", text: "launch an investigation" },
          { meaningZh: "调查初期", text: "early stages of an investigation" },
        ],
        contextExample: {
          english:
            "He said the investigation was in its early stages and urged anyone with information to come forward.",
          translationZh: "他说调查仍处于早期阶段，并呼吁知情者主动提供线索。",
        },
        contextualMeaningZh: "对案件、事故等进行系统查证的调查",
        partOfSpeech: "noun",
        pronunciation: { uk: "/ɪnˌvestɪˈɡeɪʃn/", us: "/ɪnˌvestɪˈɡeɪʃn/" },
        selectionKind: "word",
        similarTerms: [
          { meaningZh: "询问；调查", partOfSpeech: "noun", text: "inquiry" },
          { meaningZh: "检查；审查", partOfSpeech: "noun", text: "examination" },
          { meaningZh: "研究；调查", partOfSpeech: "noun", text: "research" },
        ],
        sourceText: "investigation",
        type: "translate-lexical",
      });
    </script>
  </body>
</html>
